<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Flashcards</title>
<link href="<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&family=Zen+Old+Mincho&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f9f9fb;
    --surface: #00000000;
    --surface2: #1c1c2800;
    --border: #2a2a3d;
    --accent: #000000;
    --accent2: #5e4646;
    --correct: #10b981;
    --wrong: #ef4444;
    --text: #000000;
    --muted: #2f2a2c;
    --card-bg: #f9dede17;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── GRID BACKGROUND ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── SCREENS ─── */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; min-height: 100vh; }

  /* ─── MENU SCREEN ─── */
  #menu {
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 0;
  }

  .menu-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .menu-header h1 {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #06b6d4,  #cd5656);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .menu-header p {
    font-family: 'Zen Old Mincho', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .mode-tabs {
    display: flex;
    gap: 0.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: px;
    padding: 0.4rem;
    margin-bottom: 2rem;
  }

  .mode-tab {
    flex: 1;
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: 0px;
    background: transparent;
    color: var(--muted);
    font-family: 'Cormorant', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-tab.active {
    background: #b15b5b;
    color: white;
  }

  .levels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    width: 100%;
    max-width: 900px;
  }

  .level-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0px;
    padding: 1.5rem;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .level-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.25s;
  }

  .level-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .level-card:hover::before { opacity: 0.05; }

  .level-card * { position: relative; z-index: 1; }

  .level-num {
    font-family: 'Zen Old Mincho', monospace;
    font-size: 0.7rem;
    color: var(--accent2);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .level-title {
    font-size: 1.1rem;
    font-weight: 800;
    margin-bottom: 0.3rem;
  }

  .level-count {
    font-family: 'Zen Old Mincho', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .level-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 1rem;
    overflow: hidden;
  }

  .level-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s;
  }

  /* ─── STUDY SCREEN ─── */
  #study {
    align-items: center;
    padding: 1.5rem 1rem;
    gap: 1.5rem;
  }

  .study-header {
    width: 100%;
    max-width: 560px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .back-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    color: var(--text);
    font-family: 'Cormorant', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .back-btn:hover { border-color: var(--accent); }

  .study-info { text-align: right; }

  .study-info .level-name {
    font-size: 0.8rem;
    font-weight: 800;
    color: var(--accent2);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .study-progress {
    font-family: 'Zen Old Mincho', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .progress-bar {
    width: 100%;
    max-width: 560px;
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* ─── CARD AREA ─── */
  .card-area {
    width: 100%;
    max-width: 560px;
    height: 340px;
    perspective: 1200px;
    position: relative;
  }

  .card-wrap {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1), left 0.4s ease, opacity 0.3s ease;
    cursor: pointer;
  }

  .card-wrap.flipped { transform: rotateY(180deg); }

  .card-wrap.swipe-right {
    transform: translateX(120%) rotateZ(15deg);
    opacity: 0;
  }

  .card-wrap.swipe-left {
    transform: translateX(-120%) rotateZ(-15deg);
    opacity: 0;
  }

  .card-face {
    position: absolute;
    inset: 0;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    text-align: center;
  }

  .card-face.back {
    transform: rotateY(180deg);
    background: var(--surface2);
    border-color: var(--accent);
  }

  .card-tag {
    font-family: 'Zen Old Mincho', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 1.5rem;
    padding: 0.3rem 0.8rem;
    background: rgba(142, 85, 109, 0.1);
    border-radius: 20px;
    border: 1px solid rgba(6,182,212,0.2);
  }

  .card-tag-answer {
    font-family: 'Zen Old Mincho', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 1.5rem;
    padding: 0.3rem 0.8rem;
    background: rgba(85, 124, 142, 0.1);
    border-radius: 20px;
    border: 1px solid rgba(6,182,212,0.2);
  }

  .card-front-text {
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    font-weight: 600;
    line-height: 1.5;
    color: var(--text);
  }

  .card-back-text {
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .card-back-sub {
    font-family: 'Zen Old Mincho', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.75rem;
  }

  .flip-hint {
    font-family: 'Zen Old Mincho', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 1rem;
    letter-spacing: 1px;
    opacity: 0.6;
  }

  /* ─── SWIPE BUTTONS ─── */
  .swipe-btns {
    display: flex;
    gap: 3rem;
    align-items: center;
  }

  .swipe-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid;
    font-size: 1.5rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
  }

  .swipe-btn.wrong {
    border-color: var(--wrong);
    color: var(--wrong);
  }

  .swipe-btn.correct {
    border-color: var(--correct);
    color: var(--correct);
  }

  .swipe-btn:hover { transform: scale(1.1); }
  .swipe-btn.wrong:hover { background: rgba(239,68,68,0.1); }
  .swipe-btn.correct:hover { background: rgba(16,185,129,0.1); }

  .swipe-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .swipe-label {
    text-align: center;
  }

  .swipe-label span {
    font-family: 'Zen Old Mincho', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
    display: block;
    margin-top: 0.5rem;
  }

  /* ─── RESULTS SCREEN ─── */
  #results {
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 2rem;
  }

  .results-header { text-align: center; }

  .results-header h2 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    letter-spacing: -1px;
  }

  .results-header p {
    font-family: 'Zen Old Mincho', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.5rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .score-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: conic-gradient(var(--correct) var(--pct), var(--border) 0);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .score-circle::before {
    content: '';
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: var(--bg);
    position: absolute;
  }

  .score-inner {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .score-pct {
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
  }

  .score-sub {
    font-family: 'Zen Old Mincho', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .stats-row {
    display: flex;
    gap: 1.5rem;
  }

  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.8rem;
    text-align: center;
    min-width: 100px;
  }

  .stat-val {
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
  }

  .stat-val.green { color: var(--correct); }
  .stat-val.red { color: var(--wrong); }

  .stat-label {
    font-family: 'Zen Old Mincho', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 0.3rem;
  }

  .results-btns {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-primary {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 0.9rem 2rem;
    color: white;
    font-family: 'Cormorant', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary:hover { background: #6d28d9; transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 2rem;
    color: var(--text);
    font-family: 'Cormorant', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary:hover { border-color: var(--accent); }

  /* ─── SWIPE OVERLAY ─── */
  .swipe-overlay {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }

  .swipe-overlay.show-right { background: rgba(16,185,129,0.15); opacity: 1; }
  .swipe-overlay.show-left { background: rgba(239,68,68,0.15); opacity: 1; }

  @media (max-width: 500px) {
    .card-area { height: 280px; }
    .card-face { padding: 1.5rem; }
  }
</style>
</head>
<body>

<!-- ══════════════ MENU ══════════════ -->
<div id="menu" class="screen active">
  <div class="menu-header">
    <h1>Учись, Вася</h1>
    <p>Подготовка к диктанту по IT-терминологии</p>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('translation')">Переводы</button>
    <button class="mode-tab" onclick="setMode('terms')">Термины</button>
    <button class="mode-tab" onclick="setMode('abbr')">Аббревиатуры</button>
  </div>

  <div class="levels-grid" id="levelsGrid"></div>
</div>

<!-- ══════════════ STUDY ══════════════ -->
<div id="study" class="screen">
  <div class="study-header">
    <button class="back-btn" onclick="goMenu()">← Назад</button>
    <div class="study-info">
      <div class="level-name" id="studyLevelName"></div>
      <div class="study-progress" id="studyProgress"></div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="card-area" id="cardArea">
    <div class="card-wrap" id="cardWrap" onclick="flipCard()">
      <div class="card-face front">
        <div class="card-tag" id="cardTag"></div>
        <div class="card-front-text" id="cardFront"></div>
        <div class="flip-hint">нажмите, чтобы перевернуть</div>
      </div>
      <div class="card-face back">
        <div class="card-tag-answer" id="cardTagBack">ответ</div>
        <div class="card-back-text" id="cardBack"></div>
        <div class="card-back-sub" id="cardBackSub"></div>
      </div>
      <div class="swipe-overlay" id="swipeOverlay"></div>
    </div>
  </div>

  <div class="swipe-btns">
    <div class="swipe-label">
      <button class="swipe-btn wrong" id="btnWrong" onclick="answer(false)" disabled>✕</button>
      <span>не знал</span>
    </div>
    <div class="swipe-label">
      <button class="swipe-btn correct" id="btnCorrect" onclick="answer(true)" disabled>✓</button>
      <span>знал</span>
    </div>
  </div>
</div>

<!-- ══════════════ RESULTS ══════════════ -->
<div id="results" class="screen">
  <div class="results-header">
    <h2 id="resultsTitle">Раунд завершён</h2>
    <p id="resultsLevel"></p>
  </div>

  <div class="score-circle" id="scoreCircle">
    <div class="score-inner">
      <div class="score-pct" id="scorePct"></div>
      <div class="score-sub">результат</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-val green" id="statCorrect"></div>
      <div class="stat-label">знал</div>
    </div>
    <div class="stat-box">
      <div class="stat-val red" id="statWrong"></div>
      <div class="stat-label">не знал</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statTotal"></div>
      <div class="stat-label">всего</div>
    </div>
  </div>

  <div class="results-btns">
    <button class="btn-primary" onclick="retryLevel()">Повторить</button>
    <button class="btn-secondary" onclick="goMenu()">Все темы</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════

// TRANSLATIONS (from Термины_перевод.pdf)
// Format: { front: "RU term", back: "EN term", tag: "перевод" }
// Grouped by topic

let currentMode = 'translation'; // 'translation' | 'terms' | 'abbr'
let currentLevel = null;
let currentCards = [];
let currentIndex = 0;
let isFlipped = false;
let correctCount = 0;
let wrongCount = 0;
let sessionLevelName = '';

// Progress tracking: { mode_level: { correct, wrong, total } }
let progress = JSON.parse(localStorage.getItem('cs_progress') || '{}');

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════

function init() {
  setMode('translation');
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach((t, i) => {
    const modes = ['translation', 'terms', 'abbr'];
    t.classList.toggle('active', modes[i] === mode);
  });
  renderLevels();
}

function renderLevels() {
  const grid = document.getElementById('levelsGrid');
  grid.innerHTML = '';

  if (currentMode === 'abbr') {
    const key = 'abbr_0';
    const p = progress[key] || { correct: 0, wrong: 0, total: ABBR_CARDS.length };
    const pct = p.total > 0 ? Math.round((p.correct / p.total) * 100) : 0;
    const card = document.createElement('div');
    card.className = 'level-card';
    card.innerHTML = `
      <div class="level-num">Все аббревиатуры</div>
      <div class="level-title">Аббревиатуры</div>
      <div class="level-count">${ABBR_CARDS.length} карточек</div>
      <div class="level-bar"><div class="level-bar-fill" style="width:${pct}%"></div></div>
    `;
    card.onclick = () => startLevel('abbr', 0);
    grid.appendChild(card);
    return;
  }

  const levels = currentMode === 'translation' ? TRANSLATION_LEVELS : TERM_LEVELS;
  levels.forEach((lvl, i) => {
    const key = `${currentMode}_${i}`;
    const p = progress[key] || { correct: 0, wrong: 0, total: lvl.cards.length };
    const pct = p.total > 0 ? Math.round((p.correct / p.total) * 100) : 0;
    const card = document.createElement('div');
    card.className = 'level-card';
    card.innerHTML = `
      <div class="level-num">Тема ${i + 1}</div>
      <div class="level-title">${lvl.title}</div>
      <div class="level-count">${lvl.cards.length} карточек</div>
      <div class="level-bar"><div class="level-bar-fill" style="width:${pct}%"></div></div>
    `;
    card.onclick = () => startLevel(currentMode, i);
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════════
//  STUDY
// ══════════════════════════════════════════════

function startLevel(mode, idx) {
  currentMode = mode;
  currentLevel = idx;

  let levelData;
  let tag = '';

  if (mode === 'abbr') {
    levelData = { title: 'Аббревиатуры', cards: ABBR_CARDS };
    tag = 'аббревиатура';
  } else if (mode === 'translation') {
    levelData = TRANSLATION_LEVELS[idx];
    tag = 'перевод';
  } else {
    levelData = TERM_LEVELS[idx];
    tag = 'термин';
  }

  sessionLevelName = levelData.title;
  currentCards = shuffle([...levelData.cards]).map(c => ({ ...c, tag }));
  currentIndex = 0;
  correctCount = 0;
  wrongCount = 0;

  showScreen('study');
  document.getElementById('studyLevelName').textContent = levelData.title;
  renderCard();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderCard() {
  const card = currentCards[currentIndex];
  const total = currentCards.length;

  document.getElementById('studyProgress').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progressFill').style.width = `${((currentIndex) / total) * 100}%`;
  document.getElementById('cardTag').textContent = card.tag;
  document.getElementById('cardTagBack').textContent = 'ответ';
  document.getElementById('cardFront').textContent = card.front;
  document.getElementById('cardBack').textContent = card.back;
  document.getElementById('cardBackSub').textContent = '';

  // Reset flip
  const wrap = document.getElementById('cardWrap');
  wrap.classList.remove('flipped', 'swipe-right', 'swipe-left');
  isFlipped = false;
  document.getElementById('btnCorrect').disabled = true;
  document.getElementById('btnWrong').disabled = true;
  document.getElementById('swipeOverlay').className = 'swipe-overlay';
}

function flipCard() {
  if (isFlipped) return;
  const wrap = document.getElementById('cardWrap');
  wrap.classList.add('flipped');
  isFlipped = true;
  document.getElementById('btnCorrect').disabled = false;
  document.getElementById('btnWrong').disabled = false;
}

function answer(correct) {
  if (!isFlipped) return;

  const overlay = document.getElementById('swipeOverlay');
  const wrap = document.getElementById('cardWrap');

  if (correct) {
    correctCount++;
    overlay.className = 'swipe-overlay show-right';
    wrap.classList.add('swipe-right');
  } else {
    wrongCount++;
    overlay.className = 'swipe-overlay show-left';
    wrap.classList.add('swipe-left');
  }

  document.getElementById('btnCorrect').disabled = true;
  document.getElementById('btnWrong').disabled = true;

  setTimeout(() => {
    currentIndex++;
    if (currentIndex >= currentCards.length) {
      showResults();
    } else {
      renderCard();
    }
  }, 420);
}

// ══════════════════════════════════════════════

let touchStartX = 0;
let touchStartY = 0;

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});

document.addEventListener('touchend', e => {
  if (!isFlipped) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
    answer(dx > 0);
  }
});

// ══════════════════════════════════════════════
//  RESULTS
// ══════════════════════════════════════════════

function showResults() {
  const total = currentCards.length;
  const pct = Math.round((correctCount / total) * 100);

  // Save progress
  const key = `${currentMode}_${currentLevel}`;
  progress[key] = { correct: correctCount, wrong: wrongCount, total };
  localStorage.setItem('cs_progress', JSON.stringify(progress));

  // === ИЗМЕНЕНИЕ: Показываем картинку вместо текста ===
  const resultsTitleEl = document.getElementById('resultsTitle');
  
  // Очищаем элемент от текста
  resultsTitleEl.textContent = '';
  
  // Создаём элемент изображения
  const resultImage = document.createElement('img');
  resultImage.alt = 'Результат теста';
  resultImage.style.maxWidth = '100%';
  resultImage.style.height = 'auto';
  resultImage.style.display = 'block';
  resultImage.style.margin = '0 auto';
  
  // Выбираем плейсхолдер в зависимости от результата
  // 🔧 ЗАМЕНИТЕ пути ниже на свои изображения:
  if (pct >= 80) {
    resultImage.src = 'SeasonalRankTop4.webp'; // 🎉 Отличный результат
    resultImage.className = 'result-img-excellent';    // опционально: класс для стилей
  } else if (pct >= 50) {
    resultImage.src = 'SeasonalRank7-1.webp';        // 👍 Неплохо!
    resultImage.className = 'result-img-good';
  } else {
    resultImage.src = 'SeasonalRank1-1.webp';      // 💪 Нужно повторить
    resultImage.className = 'result-img-repeat';
  }

  // После вставки изображения можно добавить подпись:
  const caption = document.createElement('p');
  caption.textContent = pct >= 80 ? 'хорош' : pct >= 50 ? 'норм' : 'нт';
  caption.style.textAlign = 'center';
  caption.style.marginTop = '10px';
  resultsTitleEl.appendChild(caption);

  // Вставляем изображение в контейнер
  resultsTitleEl.appendChild(resultImage);
  // === КОНЕЦ ИЗМЕНЕНИЯ ===

  document.getElementById('resultsLevel').textContent = sessionLevelName.toUpperCase();
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('scoreCircle').style.setProperty('--pct', `${pct}%`);
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;
  document.getElementById('statTotal').textContent = total;

  showScreen('results');
}

function retryLevel() {
  startLevel(currentMode, currentLevel);
}

function goMenu() {
  renderLevels();
  showScreen('menu');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

init();
</script>
